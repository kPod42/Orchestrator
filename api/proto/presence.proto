syntax = "proto3";

package orch.presence.v1;

option go_package = "Orch/gen/go/presencepb;presencepb";

message ConnectRequest {
  string node_id = 1;
  string session_id = 2;
}

message StatusUpdate {
  bool busy = 1;
}

message Endpoint {
  string kind = 1;
  string address = 2;
}

message EndpointUpdate {
  repeated Endpoint endpoints = 1;
}

message TaskRequest{
  string task_id = 1;
  string action = 2;
  map<string, string> args = 3;
}

message TaskOutput{
  string task_id = 1;
  string stream = 2;
  string chunk = 3;
}

message TaskResult{
  string task_id = 1;
  bool success = 2;
  int32 exit_code = 3;
  string message = 4;
}

message AgentPresenceMessage {
  oneof payload {
    ConnectRequest connect = 1;
    StatusUpdate status = 2;
    EndpointUpdate endpoint_update = 3;
    TaskOutput task_output = 4;
    TaskResult task_result = 5;

  }
}

message ConnectAck {
  string node_id = 1;
}

message ErrorMessage {
  string message = 1;
}

message CoordinatorPresenceMessage {
  oneof payload {
    ConnectAck connect_ack = 1;
    ErrorMessage error = 2;
    TaskRequest task_request = 3;
  }
}

service PresenceService {
  rpc Connect(stream AgentPresenceMessage) returns (stream CoordinatorPresenceMessage);
}