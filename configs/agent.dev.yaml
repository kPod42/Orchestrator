agent:
  node_id: actor-dev-1
  capabilities:
    - worker
    - exec

coordinator:
  register_url: http://127.0.0.1:8080/coordinator/register

  endpoints:
    - name: local
      kind: grpc
      address: 127.0.0.1:9090
      scope: same-host
      priority: 100

work:
  listen_address: 0.0.0.0:10000
  advertise_endpoint:
    - kind: lan
      address: 127.0.0.1:10000

security:
  allow_exec: true
  allowed_shells:
    - sh
    - powershell
  action_policy:
    mode: allow_all_known
  exec_timeout_sec: 60